<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software (Live Flathub Directory)</title>
    <style>
        /* GTK4 Adwaita-like Interface Design Variables */
        :root {
            --bg-color: #1e1e1e;
            --sidebar-bg: #242424;
            --card-bg: #2d2d2d;
            --card-hover: #353535;
            --text-color: #ffffff;
            --text-muted: #9a9a9a;
            --accent-color: #3584e4; 
            --accent-hover: #1b6acb;
            --border-color: rgba(255, 255, 255, 0.08);
            --radius-card: 8px;
            --font-stack: system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }

        /* Fullscreen Layout Configuration */
        .gtk-window {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .gtk-headerbar {
            height: 56px;
            background-color: var(--sidebar-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            user-select: none;
            flex-shrink: 0;
        }

        .header-title {
            font-weight: 700;
            font-size: 16px;
        }

        .search-container {
            position: relative;
            width: 400px;
        }

        .search-input {
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 12px 8px 36px;
            border-radius: var(--radius-card);
            font-size: 13px;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--accent-color);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }

        .window-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .gtk-sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar-item {
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.1s;
        }

        .sidebar-item:hover {
            background-color: rgba(255,255,255,0.05);
        }

        .sidebar-item.active {
            background-color: var(--accent-color);
        }

        .app-count {
            font-size: 11px;
            background: rgba(0,0,0,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            color: var(--text-muted);
        }

        .sidebar-item.active .app-count {
            color: white;
            background: rgba(255,255,255,0.2);
        }

        .view-stack {
            flex: 1;
            overflow-y: auto;
            background-color: var(--bg-color);
            padding: 32px;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .app-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: 16px;
            display: flex;
            gap: 16px;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.1s;
        }

        .app-card:hover {
            background-color: var(--card-hover);
        }

        .app-icon {
            width: 56px;
            height: 56px;
            object-fit: contain;
            border-radius: 8px;
            background: rgba(0,0,0,0.15);
            flex-shrink: 0;
        }

        /* Clean GTK Fallback Badge for missing images */
        .app-icon-fallback {
            width: 56px;
            height: 56px;
            border-radius: 8px;
            background-color: var(--card-hover);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: var(--accent-color);
            flex-shrink: 0;
        }

        .app-meta {
            flex: 1;
            min-width: 0;
        }

        .app-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .app-id-label {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: monospace;
        }

        .detail-view {
            display: none;
            flex-direction: column;
            gap: 24px;
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .detail-icon {
            width: 96px;
            height: 96px;
            object-fit: contain;
        }

        .detail-title-block h2 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .btn-install {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: var(--radius-card);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-install:hover {
            background-color: var(--accent-hover);
        }

        .btn-back {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: var(--radius-card);
            cursor: pointer;
            margin-bottom: 16px;
            align-self: flex-start;
            font-size: 13px;
        }

        .btn-back:hover {
            background-color: rgba(255,255,255,0.05);
        }

        .detail-body {
            font-size: 15px;
            line-height: 1.6;
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
            color: #d0d0d0;
        }

        .status-message {
            text-align: center;
            color: var(--text-muted);
            margin-top: 80px;
            font-size: 16px;
        }

        .category-header {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            letter-spacing: 1px;
            margin: 16px 0 8px 14px;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 4px; }
    </style>
</head>
<body>

    <div class="gtk-window">
        <header class="gtk-headerbar">
            <div class="header-title">Software</div>
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchBar" class="search-input" placeholder="Search direct Flathub applications stream...">
            </div>
            <div style="width: 40px;"></div>
        </header>

        <div class="window-content">
            <aside class="gtk-sidebar" id="sidebarMenu">
                <div class="sidebar-item active" id="menu-ALL" onclick="filterAlphabet('ALL')">
                    <span>All Applications</span>
                    <span class="app-count" id="count-ALL">...</span>
                </div>
                <div class="category-header">Alphabetical Filter</div>
            </aside>

            <main class="view-stack">
                <div id="gridContainer">
                    <div class="apps-grid" id="appsGrid">
                        <div class="status-message">Parsing live data maps from flathub.org appstream...</div>
                    </div>
                </div>
                <div id="detailContainer" class="detail-view"></div>
            </main>
        </div>
    </div>

    <script>
        const FLATHUB_TARGET = "https://flathub.org/api/v2/appstream";
        const CDN_BASE = "https://dl.flathub.org/repo/appstream";
        let FULL_CATALOG = [];
        let currentFilter = 'ALL';

        // Connect directly to flathub.org catalog mapping
        async function loadLiveFlathubRegistry() {
            try {
                const response = await fetch(FLATHUB_TARGET);
                if (!response.ok) throw new Error("CORS or network error");
                const list = await response.json();
                processLiveRegistry(list);
            } catch (e) {
                // JSONP translation backup fallback layout
                const scriptBypass = document.createElement('script');
                scriptBypass.src = "https://api.allorigins.win/get?url=" + encodeURIComponent(FLATHUB_TARGET) + "&callback=processFallbackJSONP";
                document.body.appendChild(scriptBypass);
            }
        }

        function processFallbackJSONP(response) {
            try {
                processLiveRegistry(JSON.parse(response.contents));
            } catch(e) {
                document.getElementById('appsGrid').innerHTML = `<div class="status-message" style="color: #ed333b;">Failed to map catalog payload directly from flathub.org servers.</div>`;
            }
        }

        function processLiveRegistry(appIds) {
            FULL_CATALOG = appIds.map(id => {
                let segment = id.split('.').pop();
                let descriptiveName = segment.charAt(0).toUpperCase() + segment.slice(1);
                return { id: id, name: descriptiveName };
            }).sort((a, b) => a.name.localeCompare(b.name));

            generateAlphabetSidebar();
            document.getElementById('count-ALL').innerText = FULL_CATALOG.length;
            filterAlphabet('ALL');
        }

        function generateAlphabetSidebar() {
            const sidebar = document.getElementById('sidebarMenu');
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            
            letters.forEach(letter => {
                const count = FULL_CATALOG.filter(app => app.name.toUpperCase().startsWith(letter)).length;
                if(count > 0) {
                    const item = document.createElement('div');
                    item.className = 'sidebar-item';
                    item.id = `menu-${letter}`;
                    item.onclick = () => filterAlphabet(letter);
                    item.innerHTML = `<span>${letter}</span><span class="app-count">${count}</span>`;
                    sidebar.appendChild(item);
                }
            });
        }

        function filterAlphabet(letter) {
            currentFilter = letter;
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`menu-${letter}`).classList.add('active');
            document.getElementById('searchBar').value = '';
            closeDetailView();

            const filtered = letter === 'ALL' 
                ? FULL_CATALOG 
                : FULL_CATALOG.filter(app => app.name.toUpperCase().startsWith(letter));
            
            renderGrid(filtered);
        }

        function renderGrid(apps) {
            const grid = document.getElementById('appsGrid');
            grid.innerHTML = '';
            
            if (apps.length === 0) {
                grid.innerHTML = `<div class="status-message">No matching applications located.</div>`;
                return;
            }

            const interfaceCap = apps.slice(0, 400);

            interfaceCap.forEach(app => {
                const card = document.createElement('div');
                card.className = 'app-card';
                card.onclick = () => openDetailView(app.id, app.name);

                const iconUrl = `${CDN_BASE}/${app.id}/icon/128x128/default.png`;
                const firstLetter = app.name.charAt(0).toUpperCase();

                card.innerHTML = `
                    <img class="app-icon" src="${iconUrl}" alt="" id="icon-${app.id}">
                    <div class="app-meta">
                        <div class="app-name">${app.name}</div>
                        <div class="app-id-label">${app.id}</div>
                    </div>
                `;
                grid.appendChild(card);

                // Handle broken/missing thumbnails instantly
                const imgElement = document.getElementById(`icon-${app.id}`);
                imgElement.onerror = function() {
                    const fallback = document.createElement('div');
                    fallback.className = 'app-icon-fallback';
                    fallback.innerText = firstLetter;
                    imgElement.parentNode.replaceChild(fallback, imgElement);
                };
            });

            if(apps.length > 400) {
                const notice = document.createElement('div');
                notice.className = 'status-message';
                notice.style.gridColumn = '1 / -1';
                notice.innerText = `Displaying first 400 items of ${apps.length}. Refine using search or letter groupings.`;
                grid.appendChild(notice);
            }
        }

        function openDetailView(appId, appName) {
            document.getElementById('gridContainer').style.display = 'none';
            const detailView = document.getElementById('detailContainer');
            detailView.style.display = 'flex';
            
            const iconUrl = `${CDN_BASE}/${appId}/icon/128x128/default.png`;
            const refDownloadUrl = `${CDN_BASE}/${appId}.flatpakref`;
            const firstLetter = appName.charAt(0).toUpperCase();

            detailView.innerHTML = `
                <button class="btn-back" onclick="closeDetailView()">← Back to Directory</button>
                <div class="detail-header">
                    <img class="detail-icon" src="${iconUrl}" id="detail-icon" alt="">
                    <div class="detail-title-block">
                        <h2>${appName}</h2>
                        <div style="font-family: monospace; color: var(--text-muted); font-size:14px; margin-bottom:16px;">${appId}</div>
                        <a class="btn-install" href="${refDownloadUrl}" download>Download .flatpakref</a>
                    </div>
                </div>
                <div class="detail-body">
                    <p>Manifest target points to active package streams. Opening this configuration routes execution scripts directly to your local Linux distribution native software installation agent.</p>
                </div>
            `;

            // Handle broken image inside singular detail page views
            const detImg = document.getElementById('detail-icon');
            detImg.onerror = function() {
                const fallback = document.createElement('div');
                fallback.className = 'app-icon-fallback';
                fallback.style.width = '96px';
                fallback.style.height = '96px';
                fallback.style.fontSize = '36px';
                fallback.innerText = firstLetter;
                detImg.parentNode.replaceChild(fallback, detImg);
            };
        }

        function closeDetailView() {
            document.getElementById('detailContainer').style.display = 'none';
            document.getElementById('gridContainer').style.display = 'block';
        }

        document.getElementById('searchBar').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (query.length > 0) {
                closeDetailView();
                const matched = FULL_CATALOG.filter(app => 
                    app.name.toLowerCase().includes(query) || 
                    app.id.toLowerCase().includes(query)
                );
                renderGrid(matched);
            } else {
                filterAlphabet(currentFilter);
            }
        });

        loadLiveFlathubRegistry();
    </script>
</body>
</html>
