<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DownloadApplications</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        h1 {
            color: #4a5568;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #718096;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            display: block;
            text-decoration: none;
            padding: 0.8rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        /* Arch Linux - Blue */
        .btn-arch {
            background-color: #1793d1;
            color: #ffffff;
        }
        .btn-arch:hover {
            background-color: #1275a7;
        }

        /* Red Hat / Fedora - Red */
        .btn-redhat {
            background-color: #cc0000;
            color: #ffffff;
        }
        .btn-redhat:hover {
            background-color: #990000;
        }

        /* Debian / Ubuntu - Orange */
        .btn-debian {
            background-color: #e95420;
            color: #ffffff;
        }
        .btn-debian:hover {
            background-color: #cf4211;
        }

        /* Universal - Indigo */
        .btn-universal {
            background-color: #4f46e5;
            color: #ffffff;
        }
        .btn-universal:hover {
            background-color: #3730a3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to DownloadApplications</h1>
        <p class="subtitle">Select your distribution package</p>
        
        <div class="btn-container">
            <a href="https://downloadapplications.github.io/arch-and-its-derivatives" class="btn btn-arch">Arch Linux</a>
            
            <a href="downloadapplications.github.io/redhat-and-its derivatives" class="btn btn-redhat">Red Hat / Fedora</a>
            
            <a href="downloadapplications.github.io/debian-and-its-derivatives" class="btn btn-debian">Debian / Ubuntu</a>
            
            <a href="downloadapplications.github.io/flatpak-apps" class="btn btn-universal">Universal</a>
        </div>
    </div>

</body>
</html>
